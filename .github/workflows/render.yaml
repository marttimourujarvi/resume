name: Build Typst document
on: push

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_typst_documents:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Typst
        uses: lvignoli/typst-action@main
        with:
          source_file: resume.typ

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: document
          path: resume.pdf
